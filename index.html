<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMANCEPTION</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#000;color:#fff}
header{position:sticky;top:0;background:#000;border-bottom:1px solid #222;padding:18px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:30px;font-weight:900;color:#000;-webkit-text-stroke:1px #fff}
nav a{color:#fff;text-decoration:none;margin-left:16px}
.hero{min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero h1{font-size:clamp(40px,8vw,90px)}
.hero p{color:#bbb;margin:15px 0 25px}
.btn{display:inline-block;padding:12px 24px;background:#fff;color:#000;text-decoration:none;border-radius:10px;font-weight:bold}
.section{padding:60px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}
.card{background:#111;border:1px solid #222;border-radius:14px;padding:20px;text-align:center}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;justify-content:center;align-items:center}
.popup-box{background:#111;padding:25px;border-radius:15px;width:90%;max-width:380px;text-align:center}
.popup-box button{width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;cursor:pointer}
.join{background:#fff}
.already{background:#222;color:#fff}
footer{text-align:center;padding:30px;border-top:1px solid #222}
</style>
</head>
<body>
  <div class="popup" id="popup">
<div class="popup-box">
<h2>Join AMANCEPTION</h2>
<p>Sports Community</p>
<button class="join" onclick="joinTelegram()">Join Now</button>
<button class="already" onclick="closePopup()">Already Joined</button>
</div>
</div>

<header>
<div class="logo">🛑 AMANCEPTION</div>
<nav>
<a href="#categories">Categories</a>
<a href="#contact">Contact</a>
</nav>
</header>

<div>
<h1>A Sports Enthusiasts Community!</h1>
<p>Cricket • Football • IPL • Formula 1 • UFC</p>
<a class="btn" href="https://t.me/amanception" target="_blank">Join Telegram</a>
</div>
</section>
<section class="section">

<section id="categories" class="section">
<h2 style="text-align:center;margin-bottom:20px">Categories</h2>

<section id="contact" class="section">

<h2>Contact</h2>
<p>amanceptionx@gmail.com</p>

<footer>© 2026 AMANCEPTION</footer>
<section class="section">
<h2 style="text-align:center;margin-bottom:20px">🔴 LIVE STREAM</h2>

<video
id="my-video"
controls
autoplay
width="100%"
height="500"
style="background:#000;border:1px solid #222;border-radius:12px"
></video>
</section>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

var video = document.getElementById("my-video");

var videoSrc = "https://103.157.248.140:8000/play/a01m/index.m3u8";

if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src = videoSrc;
}
else if(Hls.isSupported()){
var hls = new Hls();
hls.loadSource(videoSrc);
hls.attachMedia(video);
}

});
</script>
<script>
function joinTelegram(){
window.open('https://t.me/amanception','_blank');
document.getElementById('popup').style.display='none';
}
function closePopup(){
document.getElementById('popup').style.display='none';
}
</script>

</body>
